name: astrbot_plugin_layered_memory
display_name: 分层长期记忆与剧情延续
author: Codex
description: 为 AstrBot 提供分层长期记忆、语义向量召回、自动去重合并、结构化剧情状态和剧情总结。
repo: "https://github.com/taolicx/astrbot_plugin_layered_memory"
version: 0.3.0
category: AI 增强
tags:
  - 长期记忆
  - 剧情延续
  - 角色扮演
  - 智能回忆
  - 语义召回
help: |
  分层记忆默认自动工作，通常不用手动操作。
  /rmem status - 查看状态
  /rmem remember <内容> - 手动补充一条重要记忆
  /rmem forget <id> - 删除一条记忆
  /rmem summarize - 立即整理当前会话
  /rmem rebuild [数量] - 重建检索索引并补建语义向量
support_platforms:
  - aiocqhttp
  - telegram
  - discord
astrbot_version: ">=4.22.0"
